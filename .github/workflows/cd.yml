name: CD - Build and deploy

on:
  workflow_run:
    workflows:
      - CI - Validate and build
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/aut0nate/prompt-vault
  DEPLOY_PATH: /opt/stacks/prompts

jobs:
  build-and-push:
    name: Build and push image
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: docker build --build-arg DATABASE_URL=file:/app/data/dev.db -t "${IMAGE_NAME}:latest" .

      - name: Tag with commit SHA
        run: docker tag "${IMAGE_NAME}:latest" "${IMAGE_NAME}:${{ github.event.workflow_run.head_sha }}"

      - name: Push images
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ github.event.workflow_run.head_sha }}"

  deploy:
    name: Deploy to production server
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload production Compose file
        run: |
          scp -i ~/.ssh/deploy_key \
            -P "${{ secrets.VPS_PORT }}" \
            docker-compose.prod.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${DEPLOY_PATH}/docker-compose.yaml"

      - name: Deploy container
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF
          set -e

          cd "${DEPLOY_PATH}"

          if [ ! -f .env ]; then
            touch .env
            chmod 600 .env
          fi

          if grep -q '^IMAGE_TAG=' .env; then
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.event.workflow_run.head_sha }}/" .env
          else
            printf '\\nIMAGE_TAG=%s\\n' "${{ github.event.workflow_run.head_sha }}" >> .env
          fi

          docker compose pull prompt-vault
          docker compose up -d
          docker image prune -f

          docker ps --filter "name=prompt-vault"
          EOF
