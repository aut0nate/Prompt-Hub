services:
  prompt-vault:
    container_name: prompt-vault-local
    build:
      context: .
      args:
        DATABASE_URL: file:/app/data/dev.db
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/dev.db
      ATTACHMENTS_DIR: /app/data/prompt-attachments
    ports:
      - "3000:3000"
    volumes:
      - ./storage:/app/data
    logging:
      options:
        max-size: "10m"
        max-file: "3"
